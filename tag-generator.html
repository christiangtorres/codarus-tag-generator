<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Price Tag Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

  /* ── Setup panel ── */
  #setup {
    max-width: 680px;
    margin: 40px auto;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 32px;
  }
  #setup h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #1a1a1a; }
  #setup p.sub { font-size: 13px; color: #777; margin-bottom: 24px; }

  /* ── Step 1: Template cards ── */
  .tpl-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .tpl-card {
    background: #fff;
    border: 1.5px solid #e0ddd8;
    border-radius: 6px;
    padding: 16px 16px 14px;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    font-family: inherit;
  }
  .tpl-card:hover { border-color: #2c2c2c; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .tpl-card.selected { border-color: #2c2c2c; background: #fafafa; box-shadow: 0 0 0 2px #2c2c2c; }
  .tpl-card-icon { font-size: 22px; margin-bottom: 6px; }
  .tpl-card-name { font-size: 13px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.02em; margin-bottom: 4px; }
  .tpl-card-desc { font-size: 11px; color: #888; line-height: 1.5; }
  /* AS Format card spans full width */
  .tpl-card[data-value="as-format"] { grid-column: 1 / -1; border-color: #2c2c2c; background: #fafafa; }
  .tpl-card[data-value="as-format"].selected { box-shadow: 0 0 0 2px #2c2c2c; }

  /* ── Step 2: header badge ── */
  #step2-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid #eee;
  }
  #step2-tpl-badge {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #change-tpl-btn {
    background: none;
    border: 1px solid #d0cdc8;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px;
    color: #888;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, color 0.15s;
  }
  #change-tpl-btn:hover { border-color: #888; color: #444; }
  #as-hint {
    font-size: 12px;
    color: #666;
    background: #f5f5f5;
    border-radius: 4px;
    padding: 8px 12px;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  /* Drop zone */
  #dropzone {
    border: 2px dashed #ccc;
    border-radius: 6px;
    padding: 36px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 24px;
  }
  #dropzone:hover, #dropzone.drag-over {
    border-color: #2c2c2c;
    background: #fafafa;
  }
  #dropzone .icon { font-size: 32px; margin-bottom: 8px; }
  #dropzone p { font-size: 13px; color: #555; }
  #dropzone strong { color: #2c2c2c; }
  #file-input { display: none; }

  /* Column mapping */
  #mapping { display: none; }
  #mapping h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }
  .field-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .field-row label { font-size: 13px; font-weight: 500; color: #444; }
  .field-row select {
    padding: 7px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    background: #fff;
    color: #1a1a1a;
    width: 100%;
  }

  /* Options */
  #options { display: none; margin: 20px 0 0; }
  #options h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a; }
  .opt-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    font-size: 13px;
    color: #444;
  }
  .opt-row input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; }
  .opt-row input[type=text] {
    padding: 5px 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    width: 220px;
  }

  /* Logo upload */
  #logo-section { display: none; margin-top: 20px; }
  #logo-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: #1a1a1a; }
  #logo-preview { max-height: 48px; display: none; margin-top: 6px; }
  #logo-label {
    display: inline-block;
    padding: 7px 14px;
    background: #f0f0f0;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid #ddd;
  }
  #logo-label:hover { background: #e5e5e5; }
  #logo-input { display: none; }

  /* Divider */
  .sep { border: none; border-top: 1px solid #eee; margin: 24px 0; }

  /* Generate button */
  #generate-btn {
    display: none;
    width: 100%;
    padding: 13px;
    background: #2c2c2c;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 24px;
    transition: background 0.2s;
  }
  #generate-btn:hover { background: #555; }

  #template-section { display: none; }
  #file-info { font-size: 12px; color: #888; margin-top: 6px; }

  /* ── Tags view ── */
  #tags-view { display: none; }

  .print-bar {
    background: #2c2c2c;
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .print-bar button {
    padding: 8px 20px;
    border: 1px solid #fff;
    background: transparent;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 3px;
  }
  .print-bar button:hover { background: rgba(255,255,255,0.1); }
  .print-bar .back-btn { background: rgba(255,255,255,0.15); }
  .print-bar span { font-size: 13px; color: #aaa; }

  /* Tag cards */
  .tags-container { padding: 32px; }
  .tag {
    background: #fff;
    border: 1px solid #ccc;
    width: 4in;
    min-height: 5.5in;
    margin: 0 auto 32px;
    padding: 24px 20px 20px;
    page-break-after: always;
    display: flex;
    flex-direction: column;
    font-family: 'Georgia', serif;
  }
  .brand-logo { text-align: center; margin-bottom: 14px; }
  .brand-logo img { max-width: 55%; height: auto; display: block; margin: 0 auto; }
  .brand-name { text-align: center; font-weight: bold; font-size: 16px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }
  .divider { border: none; border-top: 1px solid #ccc; margin: 8px 0; }
  .collection {
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.3;
    padding: 4px 0;
  }
  .variants { display: grid; gap: 0; margin-top: 4px; }
  .variants.two-col { grid-template-columns: 1fr 1fr; }
  .variants.one-col { grid-template-columns: 1fr; }
  .variant { padding: 5px 4px; border-bottom: 1px solid #e8e8e8; text-align: center; }
  .variant:last-child { border-bottom: none; }
  .variant-size { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.06em; color: #2c2c2c; }
  .variant-sku { font-size: 8.5px; color: #888; letter-spacing: 0.05em; margin: 1px 0; }
  .variant-price { font-size: 13px; font-weight: bold; color: #2c2c2c; margin-top: 2px; }

  /* Loading spinner */
  #loading-state { display: none; text-align: center; padding: 48px 32px; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #e8e8e8;
    border-top-color: #2c2c2c;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-msg { font-size: 14px; color: #444; margin: 0 0 6px; }
  #loading-sub  { font-size: 11px; color: #aaa; margin: 0; }

  @media print {
    body { background: #fff; }
    #setup, .print-bar, .controls { display: none !important; }
    #tags-view { display: block !important; }
    .tags-container { padding: 0; }
  }
</style>
</head>
<body>

<!-- ── SETUP PANEL ── -->
<div id="setup">
  <h1>Price Tag Generator</h1>

  <!-- Step 1: Template picker -->
  <div id="step1">
    <p class="sub">Choose a template to get started.</p>
    <div class="tpl-cards">
      <button class="tpl-card selected" data-value="as-format">
        <div class="tpl-card-icon">✨</div>
        <div class="tpl-card-name">Annie Selke Format</div>
        <div class="tpl-card-desc">Auto-parses product names — routes bedding, throws, pillows, and ottomans to the right tag format automatically. No column mapping needed.</div>
      </button>
      <button class="tpl-card" data-value="bedding">
        <div class="tpl-card-icon">🛏</div>
        <div class="tpl-card-name">Bedding</div>
        <div class="tpl-card-desc">3.25″ × 7.25″ tags grouped by collection. One tag per page (pre-cut stock).</div>
      </button>
      <button class="tpl-card" data-value="rug">
        <div class="tpl-card-icon">🪢</div>
        <div class="tpl-card-name">Rug</div>
        <div class="tpl-card-desc">3.25″ × 7.25″ tags with 2-column size/price grid. One tag per page (pre-cut stock).</div>
      </button>
      <button class="tpl-card" data-value="small">
        <div class="tpl-card-icon">🏷️</div>
        <div class="tpl-card-name">Small Tags</div>
        <div class="tpl-card-desc">2″ × 3.5″ hang tags — 10 per landscape page (5 × 2 grid).</div>
      </button>
    </div>
    <button id="step1-next-btn" style="margin-top:20px;width:100%;padding:12px;background:#2c2c2c;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;font-family:inherit;" onmouseover="this.style.background='#555'" onmouseout="this.style.background='#2c2c2c'">
      Use This Template →
    </button>
  </div>

  <!-- Step 2: Upload + mapping (hidden until template chosen) -->
  <div id="step2" style="display:none;">
    <div id="step2-header">
      <span id="step2-tpl-badge"></span>
      <button id="change-tpl-btn">← Change template</button>
    </div>

    <div id="dropzone">
      <div class="icon">📄</div>
      <p><strong>Drop a file here</strong> or click to browse</p>
      <p style="margin-top:4px;font-size:11px;color:#aaa;">Supports .csv, .xls, .xlsx</p>
    </div>
    <input type="file" id="file-input" accept=".csv,.xls,.xlsx">
    <div id="file-info"></div>

    <div id="mapping">
      <hr class="sep">
      <h2>Map Columns</h2>
      <div class="field-row">
        <label>Group by (collection / family)</label>
        <select id="col-group"></select>
      </div>
      <div id="group-tip" style="font-size:11px; color:#888; margin: -6px 0 10px 164px; line-height:1.4;"></div>
      <div class="field-row">
        <label>Variant / Size</label>
        <select id="col-variant"></select>
      </div>
      <div class="field-row">
        <label>SKU</label>
        <select id="col-sku"></select>
      </div>
      <div class="field-row">
        <label>Price / MSRP</label>
        <select id="col-price"></select>
      </div>
      <div class="field-row">
        <label>Sub-section label <span style="font-weight:400;color:#aaa;">(optional)</span></label>
        <select id="col-type"><option value="">(none)</option></select>
      </div>
    </div>

    <!-- Annie Selke Format: simplified 3-field mapping (hidden — auto-parsed) -->
    <div id="as-mapping" style="display:none;">
      <div class="field-row">
        <label>Product Name</label>
        <select id="as-col-name"></select>
      </div>
      <div class="field-row">
        <label>SKU</label>
        <select id="as-col-sku"></select>
      </div>
      <div class="field-row">
        <label>Price / MSRP</label>
        <select id="as-col-price"></select>
      </div>
      <div style="margin-top:14px;">
        <label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:5px;">Custom Instructions <span style="font-weight:400;color:#aaa;">(optional)</span></label>
        <textarea id="as-instructions" placeholder='e.g. "Merge cover-only and with-insert variants onto the same tag. Skip items under $50."' style="width:100%;height:60px;padding:8px 10px;font-size:12px;border:1px solid #ddd;border-radius:4px;font-family:inherit;resize:vertical;color:#333;line-height:1.5;"></textarea>
      </div>
      <div id="as-preview" style="margin-top:16px;display:none;">
        <p style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:8px;">Parse Preview</p>
        <table id="as-preview-table" style="width:100%;font-size:11px;border-collapse:collapse;"></table>
        <p id="as-type-warning" style="font-size:12px;color:#c87020;margin-top:10px;display:none;"></p>
      </div>
    </div>

    <div id="options" style="display:none;">
      <hr class="sep">
      <h2>Options</h2>
      <div class="opt-row">
        <input type="checkbox" id="opt-color" checked>
        <label for="opt-color">Each unique group value = its own page (color/style separation)</label>
      </div>
      <div class="opt-row">
        <input type="checkbox" id="opt-sort" checked>
        <label for="opt-sort">Sort variants cheapest first</label>
      </div>
      <div class="opt-row">
        <input type="checkbox" id="opt-twocol" checked>
        <label for="opt-twocol">Two-column layout when 2+ variants</label>
      </div>
    </div>

    <div id="logo-section" style="display:none;">
      <hr class="sep">
      <h2>Logo</h2>
      <label id="logo-label" for="logo-input">Change logo image…</label>
      <input type="file" id="logo-input" accept="image/*">
      <br>
      <img id="logo-preview" alt="Logo preview">
    </div>

    <!-- Hidden select kept for JS compatibility -->
    <select id="template-select" style="display:none;">
      <option value="as-format">as-format</option>
      <option value="bedding">bedding</option>
      <option value="rug">rug</option>
      <option value="small">small</option>
    </select>
    <p id="template-hint" style="display:none;"></p>

    <button id="generate-btn" style="display:none;">Generate Tags →</button>
  </div>

  <!-- Loading state (shown while Claude parses) -->
  <div id="loading-state">
    <div class="spinner"></div>
    <p id="loading-msg">Analyzing with Claude…</p>
    <p id="loading-sub">This usually takes 3–8 seconds</p>
  </div>
</div>

<!-- ── TAGS VIEW ── -->
<div id="tags-view">
  <div class="print-bar">
    <button class="back-btn" onclick="showSetup()">← Back</button>
    <button onclick="window.print()">🖨 Print All Tags</button>
    <button onclick="addToSite()" style="background:rgba(255,255,255,0.15);">＋ Add to Site</button>
    <span id="tag-count"></span>
    <span style="font-size:11px;color:#888;margin-left:auto;">In print dialog → More settings → uncheck "Headers and footers"</span>
  </div>
  <div id="save-instructions" style="display:none; background:#1e3a1e; color:#9ed49e; padding:12px 24px; font-size:13px; line-height:1.7; border-bottom:1px solid #2a4a2a;"></div>
  <div class="tags-container" id="tags-output"></div>
</div>

// ── File handling ──
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  document.getElementById('file-info').textContent = `Loaded: ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (!raw.length) { alert('No data found in file.'); return; }
    sheetData = raw;
    headers = Object.keys(raw[0]);
    populateColumnSelects();
  };
  reader.readAsArrayBuffer(file);
}

function populateColumnSelects() {
  const template = document.getElementById('template-select').value;
  const isAS = template === 'as-format';

  // Standard selects
  const selects = ['col-group','col-variant','col-sku','col-price','col-type'];
  selects.forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = id === 'col-type' ? '<option value="">(none)</option>' : '';
    headers.forEach(h => {
      const opt = document.createElement('option');
      opt.value = h; opt.textContent = h;
      sel.appendChild(opt);
    });
  });

  // AS-specific selects
  ['as-col-name','as-col-sku','as-col-price'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    headers.forEach(h => {
      const opt = document.createElement('option');
      opt.value = h; opt.textContent = h;
      sel.appendChild(opt);
    });
  });

  // Smart defaults: fuzzy match header names
  autoSelect('col-group', ['family','collection','group','name','product']);
  autoSelect('col-variant', ['size','variant','option']);
  autoSelect('col-sku', ['sku','item','code','number']);
  autoSelect('col-price', ['msrp','price','retail','cost','amount']);
  autoSelect('as-col-name', ['product name','productname','name','product']);
  autoSelect('as-col-sku', ['sku','product sku','productsku','item','code','number']);
  autoSelect('as-col-price', ['msrp','price','retail','cost','amount']);

  document.getElementById('mapping').style.display = isAS ? 'none' : 'block';
  document.getElementById('as-mapping').style.display = isAS ? 'block' : 'none';
  document.getElementById('options').style.display = isAS ? 'none' : 'block';
  document.getElementById('logo-section').style.display = 'block';
  if (!isAS) document.getElementById('generate-btn').style.display = 'block';
  if (!isAS) updateGroupPreview();
  if (isAS) {
    updateAsPreview();
    // AS format: auto-generate immediately — no button needed
    generateTags();
  }
}


function autoSelect(selectId, keywords) {
  const sel = document.getElementById(selectId);
  for (const kw of keywords) {
    const match = headers.find(h => h.toLowerCase().includes(kw));
    if (match) { sel.value = match; return; }
  }
}

// ── Annie Selke Format parsing ────────────────────────────────────────────
const AS_PRODUCT_TYPES = [
  "Quilted Coverlet Sham", "Matelasse Coverlet", "Matelasse Sham",
  "Quilted Coverlet", "Quilted Sham", "Duvet Cover", "Duvet Sham",
  "Coverlet Sham", "Sheet Set", "Pillowcases", "Coverlet",
  "Decorative Pillow",
  "Blanket", "Throw", "Quilt", "Sham",
];
const AS_SIZE_VARIANTS = [
  "Twin/Twin XL", "California King", "Dutch Euro",
  "Full/Queen", "Standard", "Queen", "King", "Full", "Euro", "Twin",
  '16" x 24"', "16x24", '22" Square',
];
const AS_SMALL_TYPES  = new Set(["Blanket","Throw","Decorative Pillow","Rug Ottoman","Indoor/Outdoor Pillow"]);
const AS_BEDDING_TYPES = new Set(["Quilted Coverlet Sham","Matelasse Coverlet","Matelasse Sham",
  "Quilted Coverlet","Quilted Sham","Duvet Cover","Duvet Sham",
  "Coverlet Sham","Sheet Set","Pillowcases","Coverlet","Quilt","Sham"]);
const AS_RUG_TYPES = new Set(["Rug","Indoor/Outdoor Rug"]);

function asStripEnd(str, list) {
  for (const s of list) {
    if (str.endsWith(' ' + s)) return { base: str.slice(0, -(s.length + 1)), matched: s };
  }
  return { base: str, matched: null };
}

function asParseRow(fullName, sku, priceStr) {
  const price = parseFloat(String(priceStr).replace(/[$,]/g, '')) || 0;
  const name = String(fullName || '').trim().replace(/​/g, '');
  // Special case: "Rug Ottoman" mid-name
  const rugIdx = name.indexOf(' Rug Ottoman ');
  if (rugIdx !== -1) {
    return { collection: name.slice(0, rugIdx), type: 'Rug Ottoman',
             variant: name.slice(rugIdx + 13), sku, price };
  }
  const { base: afterSize, matched: variant } = asStripEnd(name, AS_SIZE_VARIANTS);
  const { base: collection, matched: type }   = asStripEnd(afterSize, AS_PRODUCT_TYPES);
  return { collection: collection || name, type: type || 'Other', variant: variant || '', sku, price };
}

function updateAsPreview() {
  const nameCol  = document.getElementById('as-col-name').value;
  const skuCol   = document.getElementById('as-col-sku').value;
  const priceCol = document.getElementById('as-col-price').value;
  if (!nameCol || !sheetData.length) return;

  const parsed = sheetData.slice(0, 5).map(r =>
    asParseRow(r[nameCol], r[skuCol], r[priceCol])
  );

  const all = sheetData.map(r => asParseRow(r[nameCol], r[skuCol], r[priceCol]));
  const collections = new Set(all.map(r => r.collection));
  const types = new Set(all.map(r => r.type));
  const smallCount = all.filter(r => AS_SMALL_TYPES.has(r.type)).length;
  const beddingCount = all.filter(r => AS_BEDDING_TYPES.has(r.type)).length;

  const warn = document.getElementById('as-type-warning');
  if (smallCount > 0 && beddingCount > 0) {
    warn.textContent = `⚠ Mixed sheet: ${smallCount} small-tag item${smallCount!==1?'s':''} (pillows/throws) and ${beddingCount} bedding item${beddingCount!==1?'s':''}. Two separate files will be generated.`;
    warn.style.display = 'block';
  } else {
    warn.style.display = 'none';
  }

  const table = document.getElementById('as-preview-table');
  table.innerHTML = `
    <tr style="background:#f5f5f5;">
      <th style="padding:4px 8px;text-align:left;color:#666;">Product Name (first 5)</th>
      <th style="padding:4px 8px;text-align:left;color:#666;">Collection</th>
      <th style="padding:4px 8px;text-align:left;color:#666;">Type</th>
      <th style="padding:4px 8px;text-align:left;color:#666;">Variant</th>
    </tr>
    ${parsed.map(r => `
      <tr style="border-top:1px solid #eee;">
        <td style="padding:4px 8px;color:#999;font-size:10px;">${sheetData[parsed.indexOf(r)][nameCol]?.slice(0,35) || ''}</td>
        <td style="padding:4px 8px;font-weight:600;">${r.collection}</td>
        <td style="padding:4px 8px;color:#666;">${r.type}</td>
        <td style="padding:4px 8px;color:#888;">${r.variant || '—'}</td>
      </tr>`).join('')}
  `;
  document.getElementById('as-preview').style.display = 'block';

  const summary = document.getElementById('as-preview').querySelector('p:first-child') || document.createElement('p');
  // Update hint below table
  const hint = `${collections.size} collection${collections.size!==1?'s':''} · ${all.length} items · types: ${[...types].join(', ')}`;
  table.setAttribute('data-summary', hint);
}

document.addEventListener('change', e => {
  if (['as-col-name','as-col-sku','as-col-price'].includes(e.target.id)) updateAsPreview();
});

function updateGroupPreview() {
  const groupCol = document.getElementById('col-group').value;
  if (!groupCol || !sheetData.length) return;
  const unique = new Set(sheetData.map(r => String(r[groupCol] || '').trim()).filter(Boolean));
  const tip = document.getElementById('group-tip');
  tip.textContent = `"${groupCol}" has ${unique.size} unique value${unique.size !== 1 ? 's' : ''} → ${unique.size} tag${unique.size !== 1 ? 's' : ''} will be generated.`;
  tip.style.color = unique.size === sheetData.length ? '#c87020' : '#447744';
  if (unique.size === sheetData.length && sheetData.length > 1) {
    tip.textContent += ' ⚠ Each row is its own tag — is this correct? You may need a dedicated "Collection" column.';
  }
}
document.addEventListener('change', e => {
  if (e.target.id === 'col-group') updateGroupPreview();
});

// ── Logo upload ──
document.getElementById('logo-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    LOGO_SRC = ev.target.result;
    const prev = document.getElementById('logo-preview');
    prev.src = LOGO_SRC;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

// ── Template hint ──
function updateTemplateHint() {
  const hints = {
    'as-format': 'Reads Product Name, SKU, and Price. Automatically extracts collection, type, and variant — routes bedding items to large tags and pillows/throws/ottomans to small tags.',
    bedding: 'Groups by collection name. Sub-groups by product type if mapped. Large 3-up landscape tags.',
    rug: 'Groups by collection name. 2-column pricing grid with dividers. Large 3-up landscape tags.',
    small: 'Groups by collection name. Compact 2″ × 3.5″ hang tags, 10 per landscape page.'
  };
  const val = document.getElementById('template-select').value;
  document.getElementById('template-hint').textContent = hints[val] || '';
}

function splitName(name) {
  const words = name.split(' ');
  if (words.length <= 2) return name;
  const mid = Math.ceil(words.length / 2);
  return words.slice(0, mid).join(' ') + '<br>' + words.slice(mid).join(' ');
}

function formatPrice(num) {
  return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function renderBeddingTag(groupName, items, typeCol, twoCol, logoHtml) {
  const typeGroups = new Map();
  if (typeCol) {
    for (const item of items) {
      if (!typeGroups.has(item.type)) typeGroups.set(item.type, []);
      typeGroups.get(item.type).push(item);
    }
  } else {
    typeGroups.set('', items);
  }
  let sectionsHtml = '';
  for (const [typeName, typeItems] of typeGroups) {
    const useSingleCol = !twoCol || typeItems.length === 1;
    const gridClass = useSingleCol ? 'single-col' : '';
    sectionsHtml += `<div class="type-section">
      ${typeName ? `<div class="type-name" contenteditable="true">${typeName}</div>` : ''}
      <div class="variants ${gridClass}">
        ${typeItems.map(item => `
          <div class="variant">
            <div class="variant-size" contenteditable="true">${item.variant}</div>
            <div class="variant-sku" contenteditable="true">${item.sku}</div>
            <div class="variant-price" contenteditable="true">${formatPrice(item.price)}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }
  return `
    ${logoHtml}
    <div class="collection-name" contenteditable="true">${splitName(groupName)}</div>
    ${sectionsHtml}`;
}

// Pillowcases and/or Sheet Set ALWAYS move to their own second tag (hard rule,
// independent of available space). The second tag repeats the logo + collection
// name, then lists those section(s). Returns the number of .tag nodes appended.
function isBeddingOverflowType(type) {
  const t = String(type || '').toLowerCase().replace(/[^a-z]/g, '');
  return t.includes('pillowcase') || t.includes('sheetset');
}

function appendBeddingTags(groupName, items, typeCol, twoCol, logoHtml, container) {
  const primary  = items.filter(i => !isBeddingOverflowType(i.type));
  const overflow = items.filter(i =>  isBeddingOverflowType(i.type));
  let tagItemGroups;
  if (overflow.length === 0)      tagItemGroups = [items];              // no PC/SS → one tag
  else if (primary.length === 0)  tagItemGroups = [overflow];           // only PC/SS → one tag
  else                            tagItemGroups = [primary, overflow];  // split into two tags
  tagItemGroups.forEach(group => {
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.innerHTML = renderBeddingTag(groupName, group, typeCol, twoCol, logoHtml);
    container.appendChild(tag);
  });
  return tagItemGroups.length;
}

function renderRugTag(groupName, items, logoHtml) {
  const gridClass = items.length > 1 ? 'two-col' : '';
  const variantsHtml = items.map((item, i) => `
    <div class="variant">
      <div class="variant-size" contenteditable="true">${item.variant}</div>
      <div class="variant-sku" contenteditable="true">${item.sku}</div>
      <div class="variant-price" contenteditable="true">${formatPrice(item.price)}</div>
    </div>`).join('');
  return `
    ${logoHtml}
    <div class="collection" contenteditable="true">${splitName(groupName)}</div>
    <hr class="divider">
    <div class="variants ${gridClass}">${variantsHtml}</div>`;
}

function renderSmallTag(groupName, items, typeCol, logoHtml) {
  const typeGroups = new Map();
  if (typeCol) {
    for (const item of items) {
      if (!typeGroups.has(item.type)) typeGroups.set(item.type, []);
      typeGroups.get(item.type).push(item);
    }
  } else {
    typeGroups.set('', items);
  }
  let sectionsHtml = '';
  for (const [typeName, typeItems] of typeGroups) {
    sectionsHtml += `
      ${typeName ? `<div class="type-name" contenteditable="true">${typeName}</div>` : ''}
      <div class="variants">
        ${typeItems.map(item => {
          const sizeHtml = item.variant ? `<div class="variant-size" contenteditable="true">${item.variant}</div>` : '';
          const priceStr = typeof item.price === 'string' ? item.price : formatPrice(item.price);
          return `<div class="variant">
            ${sizeHtml}
            <div class="variant-sku" contenteditable="true">${item.sku}</div>
            <div class="variant-price" contenteditable="true">${priceStr}</div>
          </div>`;
        }).join('')}
      </div>`;
  }
  return `
    ${logoHtml}
    <div class="collection-name" contenteditable="true">${splitName(groupName)}</div>
    <hr class="divider">
    ${sectionsHtml}`;
}

async function generateTags() {
  const groupCol = document.getElementById('col-group').value;
  const variantCol = document.getElementById('col-variant').value;
  const skuCol = document.getElementById('col-sku').value;
  const priceCol = document.getElementById('col-price').value;
  const typeCol = document.getElementById('col-type').value;
  const sortPrice = document.getElementById('opt-sort').checked;
  const twoCol = document.getElementById('opt-twocol').checked;
  const template = document.getElementById('template-select').value;

  // Annie Selke Format: use dedicated parser
  if (template === 'as-format') { await generateAsFormatTags(); return; }

  // Group data
  const groups = new Map();
  for (const row of sheetData) {
    const groupKey = String(row[groupCol] || '').trim();
    if (!groupKey) continue;
    if (!groups.has(groupKey)) groups.set(groupKey, []);
    groups.get(groupKey).push({
      sku: String(row[skuCol] || ''),
      variant: String(row[variantCol] || ''),
      price: parseFloat(String(row[priceCol]).replace(/[$,]/g, '')) || 0,
      type: typeCol ? String(row[typeCol] || '') : ''
    });
  }

  if (sortPrice) {
    for (const items of groups.values()) items.sort((a, b) => a.price - b.price);
  }

  // Inject template CSS
  let existingStyle = document.getElementById('template-override-css');
  if (existingStyle) existingStyle.remove();
  const style = document.createElement('style');
  style.id = 'template-override-css';
  style.textContent = getTemplateCss(template);
  document.head.appendChild(style);

  const output = document.getElementById('tags-output');
  output.innerHTML = '';
  let tagCount = 0;

  const logoHtml = LOGO_SRC
    ? `<div class="brand-logo"><img src="${LOGO_SRC}" alt="Brand Logo"></div>`
    : `<div class="brand-name">ANNIE SELKE</div>`;

  for (const [groupName, items] of groups) {
    if (template === 'bedding') {
      tagCount += appendBeddingTags(groupName, items, typeCol, twoCol, logoHtml, output);
      continue;
    }
    const tag = document.createElement('div');
    tag.className = 'tag';

    if (template === 'rug') {
      tag.innerHTML = renderRugTag(groupName, items, logoHtml);
    } else {
      tag.innerHTML = renderSmallTag(groupName, items, typeCol, logoHtml);
    }
    output.appendChild(tag);
    tagCount++;
  }

  document.getElementById('tag-count').textContent = `${tagCount} tag${tagCount !== 1 ? 's' : ''} generated`;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('tags-view').style.display = 'block';
}

// ── Parse rows through /api/parse in concurrency-limited batches ──
// A single request can't handle hundreds of rows: the model's output blows past
// max_tokens (truncated → unparseable) and the serverless call exceeds its timeout.
// One request per ~40 rows keeps each call fast and small. Results are aligned 1:1
// with the input; any batch that errors is parsed locally so no rows are lost.
const AS_BATCH_SIZE  = 40;
const AS_CONCURRENCY = 4;

async function asParseRowsBatched(rows, instructions, validRows, nameCol, skuCol, priceCol, onProgress) {
  const batches = [];
  for (let i = 0; i < rows.length; i += AS_BATCH_SIZE) {
    batches.push({ start: i, rows: rows.slice(i, i + AS_BATCH_SIZE) });
  }
  const parsed = new Array(rows.length);
  let done = 0, failedCount = 0;

  async function runBatch(batch) {
    const body = { rows: batch.rows };
    if (instructions) body.instructions = instructions;
    try {
      const resp = await fetch('/api/parse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!resp.ok) {
        const e = await resp.json().catch(() => ({}));
        throw new Error(e.error || `HTTP ${resp.status}`);
      }
      const data = await resp.json();
      if (!Array.isArray(data.parsed) || data.parsed.length !== batch.rows.length)
        throw new Error('row count mismatch');
      data.parsed.forEach((p, j) => { parsed[batch.start + j] = p; });
    } catch (err) {
      console.warn(`Batch @${batch.start} failed (${err.message}) — using local parser`);
      failedCount += batch.rows.length;
      batch.rows.forEach((_, j) => {
        const vr = validRows[batch.start + j];
        parsed[batch.start + j] = asParseRow(vr[nameCol], vr[skuCol], vr[priceCol]);
      });
    } finally {
      done += batch.rows.length;
      if (onProgress) onProgress(done, rows.length);
    }
  }

  let next = 0;
  async function worker() {
    while (next < batches.length) await runBatch(batches[next++]);
  }
  await Promise.all(
    Array.from({ length: Math.min(AS_CONCURRENCY, batches.length) }, worker)
  );
  return { parsed, failedCount };
}

async function generateAsFormatTags() {
  const nameCol  = document.getElementById('as-col-name').value;
  const skuCol   = document.getElementById('as-col-sku').value;
  const priceCol = document.getElementById('as-col-price').value;

  // ── Show loading state ──
  document.getElementById('step2').style.display = 'none';
  const loadingState = document.getElementById('loading-state');
  const loadingMsg   = document.getElementById('loading-msg');
  const validRows    = sheetData.filter(r => r[nameCol]);
  loadingMsg.textContent = `Analyzing ${validRows.length} products with Claude…`;
  loadingState.style.display = 'block';

  const rows = validRows.map(r => ({
    name:  String(r[nameCol] || ''),
    sku:   String(r[skuCol]  || ''),
    price: parseFloat(String(r[priceCol] || '0').replace(/[$,]/g, '')) || 0
  }));
  const instructions = (document.getElementById('as-instructions').value || '').trim();

  // Parse in batches — see asParseRowsBatched. Failed batches fall back locally.
  const { parsed, failedCount } = await asParseRowsBatched(
    rows, instructions, validRows, nameCol, skuCol, priceCol,
    (d, t) => { loadingMsg.textContent = `Analyzing ${t} products with Claude… ${d}/${t}`; }
  );
  const usedFallback = failedCount > 0;
  const all = parsed.filter(r => r && r.collection && !r.suppress);

  loadingState.style.display = 'none';

  // Separate into small-tag, bedding, and rug groups
  const smallItems    = all.filter(r => AS_SMALL_TYPES.has(r.type));
  const beddingItems  = all.filter(r => AS_BEDDING_TYPES.has(r.type));
  const rugItems      = all.filter(r => AS_RUG_TYPES.has(r.type));

  const output = document.getElementById('tags-output');
  output.innerHTML = '';

  const logoHtml = LOGO_SRC
    ? `<div class="brand-logo"><img src="${LOGO_SRC}" alt="Annie Selke"></div>`
    : `<div class="brand-name">ANNIE SELKE</div>`;

  // ── Helper: build tag DOM nodes into a container for a given item set + template
  function buildSmallTagNodes(items, container) {
    const expanded = [];
    items.forEach(item => {
      if (item.type === 'Rug Ottoman' && item.variant) {
        const finish = item.variant.split(' ')[0];
        const shape  = item.variant.split(' ').slice(2).join(' ');
        expanded.push({ ...item, type: `Rug Ottoman · ${finish} Legs`, variant: shape || item.variant });
      } else {
        expanded.push(item);
      }
    });
    const cols = new Map();
    expanded.forEach(({ collection, type, sku, variant, price }) => {
      if (!cols.has(collection)) cols.set(collection, new Map());
      const types = cols.get(collection);
      if (!types.has(type)) types.set(type, []);
      types.get(type).push({ sku, variant, price, type });
    });
    for (const types of cols.values())
      for (const arr of types.values())
        arr.sort((a, b) => a.price - b.price);
    const tagEls = [];
    cols.forEach((types, collectionName) => {
      types.forEach((arr, typeName) => {
        const fmtItems = arr.map(i => ({ ...i, price: formatPrice(i.price) }));
        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.innerHTML = renderSmallTag(collectionName, fmtItems, true, logoHtml);
        tagEls.push(tag);
      });
    });
    // Group into page containers of 10 (5 cols × 2 rows)
    for (let i = 0; i < tagEls.length; i += 10) {
      const page = document.createElement('div');
      page.className = 'tag-page';
      tagEls.slice(i, i + 10).forEach(t => page.appendChild(t));
      container.appendChild(page);
    }
    return tagEls.length;
  }

  function buildBeddingTagNodes(items, container) {
    const cols = new Map();
    items.forEach(({ collection, type, sku, variant, price }) => {
      if (!cols.has(collection)) cols.set(collection, new Map());
      const types = cols.get(collection);
      if (!types.has(type)) types.set(type, []);
      types.get(type).push({ sku, variant, price, type });
    });
    for (const types of cols.values())
      for (const arr of types.values())
        arr.sort((a, b) => a.price - b.price);
    let count = 0;
    cols.forEach((types, collectionName) => {
      const allItems = [];
      types.forEach((arr, typeName) => arr.forEach(i => allItems.push({ ...i })));
      count += appendBeddingTags(collectionName, allItems, true, true, logoHtml, container);
    });
    return count;
  }

  // One rug tag per collection, all sizes listed (sorted by price). Rug template
  // is 3.25″ × 7.25″, one tag per page; CSS handles any size overflow to page 2.
  function buildRugTagNodes(items, container) {
    const cols = new Map();
    items.forEach(({ collection, type, sku, variant, price }) => {
      if (!cols.has(collection)) cols.set(collection, []);
      cols.get(collection).push({ sku, variant, price, type });
    });
    let count = 0;
    cols.forEach((arr, collectionName) => {
      arr.sort((a, b) => a.price - b.price);   // renderRugTag formats price itself — pass raw numbers
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.innerHTML = renderRugTag(collectionName, arr, logoHtml);
      container.appendChild(tag);
      count++;
    });
    return count;
  }

  function makeStandaloneHtml(container, template) {
    const css = getTemplateCss(template);
    return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Annie Selke Tags</title>
<style>* { box-sizing: border-box; } body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; margin: 0; }
.controls { margin-bottom: 20px; display: flex; gap: 12px; align-items: center; }
.controls button { padding: 8px 16px; font-size: 13px; cursor: pointer; border: 1px solid #999; background: #fff; border-radius: 4px; font-family: Arial, sans-serif; }
.hint { font-size: 12px; color: #666; }
[contenteditable]:focus { outline: 1px solid #4a90d9; background: #f0f7ff; }
[contenteditable]:hover { background: #fafafa; cursor: text; }

  }

  // Active product categories, in display order. Each renders to its own template.
  const buckets = [
    { template: 'small',   label: 'Small Tags',   icon: '🏷️', size: '2″ × 3.5″',
      desc: 'Blankets, throws, decorative pillows & rug ottomans — 2″ × 3.5″ hang tags.',
      items: smallItems,   build: buildSmallTagNodes },
    { template: 'bedding', label: 'Bedding Tags', icon: '🛏', size: '3.25″ × 7.25″',
      desc: 'Duvet covers, shams, sheet sets, pillowcases, quilts, coverlets — grouped by collection.',
      items: beddingItems, build: buildBeddingTagNodes },
    { template: 'rug',     label: 'Rug Tags',     icon: '🪢', size: '3.25″ × 7.25″',
      desc: 'Rugs & indoor/outdoor rugs — one tag per collection, all sizes listed.',
      items: rugItems,     build: buildRugTagNodes },
  ].filter(b => b.items.length > 0);

  // Warnings appended to whatever count text we show
  const otherItems = all.filter(r =>
    !AS_SMALL_TYPES.has(r.type) && !AS_BEDDING_TYPES.has(r.type) && !AS_RUG_TYPES.has(r.type));
  const fallbackNote = usedFallback
    ? ` · ⚠ ${failedCount}/${rows.length} via local parser (Claude unavailable)` : '';
  const skipNote = otherItems.length > 0
    ? ` · ⚠ ${otherItems.length} item${otherItems.length !== 1 ? 's' : ''} skipped (unrecognized type: ${[...new Set(otherItems.map(r => r.type))].join(', ')})`
    : '';

  // ── Multiple categories: one standalone file per category ──
  if (buckets.length >= 2) {
    const date = new Date().toISOString().slice(0, 10);
    const built = buckets.map(b => {
      const container = document.createElement('div');
      const count = b.build(b.items, container);
      const html  = makeStandaloneHtml(container, b.template);
      addGeneratedCard({
        title: `Annie Selke ${b.label}`,
        description: b.desc,
        meta: `${count} tag${count !== 1 ? 's' : ''} · Annie Selke`,
        icon: b.icon,
        html,
        uploadDate: date
      });
      const url = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
      window.open(url, '_blank');
      return { ...b, count, url };
    });

    const totalCount = built.reduce((s, b) => s + b.count, 0);
    document.getElementById('setup').style.display = 'none';
    document.getElementById('save-instructions').style.display = 'none';
    document.getElementById('tags-view').style.display = 'block';
    document.getElementById('tag-count').textContent =
      `${totalCount} tags · ${built.length} files generated${fallbackNote}${skipNote}`;
    const cardsHtml = built.map(b => `
          <div style="background:#fff;border:1px solid #e0ddd8;border-left:3px solid #5bb3a8;padding:20px 20px 16px;flex:1;min-width:180px;">
            <div style="font-size:24px;margin-bottom:8px;">${b.icon}</div>
            <div style="font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#1a1a1a;margin-bottom:4px;">${b.label}</div>
            <div style="font-size:11px;color:#aaa;margin-bottom:14px;">${b.count} tag${b.count !== 1 ? 's' : ''} · ${b.size}</div>
            <button onclick="window.open('${b.url}','_blank')" style="background:#2c2c2c;color:#fff;border:none;padding:6px 16px;font-size:12px;cursor:pointer;border-radius:3px;font-family:inherit;">Open ↗</button>
          </div>`).join('');
    document.getElementById('tags-output').innerHTML = `
      <div style="padding:40px 32px;max-width:760px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#5bb3a8;margin-bottom:6px;">✓ ${built.length} tag sets generated</div>
        <div style="font-size:13px;color:#555;margin-bottom:28px;">This file contains multiple product categories — each opened in a new tab and saved to your home page.</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:32px;">${cardsHtml}</div>
        <a href="index.html" style="font-size:12px;color:#888;text-decoration:none;border-bottom:1px solid #ddd;padding-bottom:2px;">← Back to home page</a>
      </div>`;
    lastDominantTemplate = built[0].template;
    return;
  }

  // ── Single category (or none): render inline in the tags view ──
  const only = buckets[0];
  const template = only ? only.template : 'small';
  lastDominantTemplate = template;
  let existingStyle = document.getElementById('template-override-css');
  if (existingStyle) existingStyle.remove();
  const style = document.createElement('style');
  style.id = 'template-override-css';
  style.textContent = getTemplateCss(template);
  document.head.appendChild(style);

  const tagCount = only ? only.build(only.items, output) : 0;

  document.getElementById('tag-count').textContent =
    `${tagCount} tag${tagCount !== 1 ? 's' : ''} generated${fallbackNote}${skipNote}`;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('tags-view').style.display = 'block';

  // Auto-add to site and open immediately
  addToSite();
}

// ── localStorage card storage ──────────────────────────────────────────────
const GENERATED_KEY = 'as-tags-generated-v1';

function getGeneratedCards() {
  try { return JSON.parse(localStorage.getItem(GENERATED_KEY) || '[]'); }
  catch { return []; }
}

function addGeneratedCard(card) {
  const cards = getGeneratedCards();
  const id = 'gen-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
  cards.unshift({ id, ...card, createdAt: Date.now() });
  try {
    localStorage.setItem(GENERATED_KEY, JSON.stringify(cards));
  } catch (e) {
    // localStorage quota exceeded — remove oldest cards and retry
    while (cards.length > 1) {
      cards.pop();
      try { localStorage.setItem(GENERATED_KEY, JSON.stringify(cards)); break; }
      catch {}
    }
  }
  return id;
}

function addToSite() {
  const template = document.getElementById('template-select').value;
  const effectiveTemplate = template === 'as-format' ? lastDominantTemplate : template;
  const templateCss = getTemplateCss(effectiveTemplate);
  const tagsHtml = document.getElementById('tags-output').innerHTML;
  const tagCount = document.getElementById('tag-count').textContent;

  const icon = effectiveTemplate === 'bedding' ? '🛏' : effectiveTemplate === 'rug' ? '🪢' : '🏷️';
  const typeLabel = effectiveTemplate === 'bedding' ? 'Bedding Tags' :
                    effectiveTemplate === 'rug'     ? 'Rug Tags'     : 'Small Tags';

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Annie Selke Tags</title>
<style>
  * { box-sizing: border-box; }

  .controls { margin-bottom: 20px; display: flex; gap: 12px; align-items: center; }
  .controls button { padding: 8px 16px; font-size: 13px; cursor: pointer; border: 1px solid #999; background: #fff; border-radius: 4px; font-family: Arial, sans-serif; }
  .controls button:hover { background: #eee; }
  .hint { font-size: 12px; color: #666; }
  [contenteditable]:focus { outline: 1px solid #4a90d9; background: #f0f7ff; }
  [contenteditable]:hover { background: #fafafa; cursor: text; }
  ${templateCss}
</style>
</head>
<body>
<div class="controls">
  <button onclick="window.print()">Print / Save as PDF</button>
  <button id="cutLineBtn" onclick="toggleCutLines()">Cut Lines: ON</button>
  <span class="hint">${tagCount} — Click any text to edit before printing.</span>
  <span class="hint" style="margin-left:auto;color:#999;">In print dialog → More settings → uncheck "Headers and footers"</span>
</div>
<div class="tags-container" id="tags">${tagsHtml}</div>
<script>
function toggleCutLines() {
  const on = document.body.classList.toggle('no-cut-lines');
  document.getElementById('cutLineBtn').textContent = on ? 'Cut Lines: OFF' : 'Cut Lines: ON';
}
<\/script>
</body>
</html>`;

  const date = new Date().toISOString().slice(0, 10);
  addGeneratedCard({
    title: `Annie Selke ${typeLabel}`,
    description: tagCount,
    meta: `Generated ${date} · Annie Selke`,
    icon,
    html,
    uploadDate: date
  });

  // Open the card immediately in a new tab
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');

  const sizeLabel = effectiveTemplate === 'bedding' ? '3.25″ × 7.25″' :
                    effectiveTemplate === 'rug'     ? '3.25″ × 7.25″' : '2″ × 3.5″';
  document.getElementById('save-instructions').innerHTML =
    `<strong>✓ Saved to home page</strong> &nbsp;·&nbsp; ${typeLabel} &nbsp;·&nbsp; ${tagCount} &nbsp;·&nbsp; ${sizeLabel}
     &nbsp;&nbsp;<a href="index.html" style="color:#9ed49e;margin-left:4px;">← Home page</a>`;
  document.getElementById('save-instructions').style.display = 'block';
}

function showSetup() {
  document.getElementById('setup').style.display = 'block';
  document.getElementById('tags-view').style.display = 'none';
  document.getElementById('save-instructions').style.display = 'none';
  // Return to step 2 (same template) so they can drop a new file
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
}
</script>
