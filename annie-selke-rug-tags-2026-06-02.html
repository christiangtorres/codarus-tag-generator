<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Annie Selke Rug Tags</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 24px; margin: 0; }

  .controls {
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .controls button {
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid #999;
    background: #fff;
    border-radius: 4px;
    letter-spacing: normal;
    text-transform: none;
  }
  .controls button:hover { background: #eee; }

  .tag {
    background: #fff;
    border: 1px solid #ccc;
    width: 3.25in;
    min-height: 7.25in;
    margin: 0;
    padding: 0.5in 20px 20px;
    display: flex;
    flex-direction: column;
  }

  .brand-logo {
    text-align: center;
    margin-bottom: 0;
  }
  .brand-logo img {
    max-width: 180px;
    max-height: 60px;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  .divider {
    border: none;
    border-top: 1px solid #ccc;
    margin: 6px 0 10px;
  }
  .divider-thick {
    border: none;
    border-top: 1px solid #e8e8e8;
    margin: 6px 0 10px;
  }

  .collection {
    font-size: 16.5px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.3;
    margin: 0.25in 0 6px;
    font-family: Arial, sans-serif;
  }

  .variants {
    display: grid;
    gap: 0;
    margin-top: 6px;
  }
  .variants.two-col { grid-template-columns: 1fr 1fr; }
  .variants.one-col { grid-template-columns: 1fr; }

  /* Odd last item stays in column 1 */
  .two-col .variant:last-child:nth-child(odd) {
    grid-column: 1;
  }

  .variant {
    padding: 12px 4px;
    text-align: center;
    border-bottom: 1px solid #e8e8e8;
  }
  .variant:last-child { border-bottom: none; }
  /* Remove bottom border from the left-column item in the last full row of even-count grids */
  .two-col .variant:nth-last-child(2):nth-child(odd) { border-bottom: none; }

  /* Vertical divider between columns — extends to last odd item */
  .two-col .variant:nth-child(odd) {
    border-right: 1px solid #e8e8e8;
  }

  .variant-size {
    font-size: 13px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #2c2c2c;
  }
  .variant-sku {
    font-size: 11px;
    color: #888;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin: 2px 0;
  }
  .variant-price {
    font-size: 13px;
    font-weight: bold;
    text-transform: uppercase;
    color: #2c2c2c;
    margin-top: 3px;
  }

  #tags {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  @media print {
    @page { size: 3.25in 7.25in; margin: 0; }
    body { background: #fff; padding: 0; }
    .controls { display: none; }
    body.no-cut-lines .tag { border-color: transparent; }
    #tags { display: block; }
    .tag {
      width: 3.25in;
      min-height: 7.25in;
      page-break-inside: avoid;
      break-inside: avoid;
      page-break-after: always;
      break-after: page;
      margin: 0;
      border: 1px solid #ccc;
    }
    .tag:last-child {
      page-break-after: auto;
      break-after: auto;
    }
    .variant {
      page-break-inside: avoid;
      break-inside: avoid;
    }
  }
</style>
</head>
<body>

<div class="controls">
  <button onclick="window.print()">Print All Tags</button>
  <button id="cutLineBtn" onclick="toggleCutLines()">Cut Lines: ON</button>
</div>

const groups = new Map();
for (const [sku, name, size, msrp] of RAW) {
  if (!groups.has(name)) groups.set(name, []);
  groups.get(name).push({ sku, size, msrp });
}

for (const items of groups.values()) {
  items.sort((a, b) => a.msrp - b.msrp);
}

const container = document.getElementById('tags');

for (const [name, items] of groups) {
  const useSingleCol = items.length === 1;
  const gridClass = useSingleCol ? 'one-col' : 'two-col';

  const variantsHtml = items.map(item => `
    <div class="variant">
      <div class="variant-size" contenteditable="true">${item.size}</div>
      <div class="variant-sku" contenteditable="true">${item.sku}</div>
      <div class="variant-price" contenteditable="true">$${item.msrp.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
    </div>
  `).join('');

  const logoHtml = LOGO_SRC
    ? `<div class="brand-logo"><img src="${LOGO_SRC}" alt="Annie Selke"></div>`
    : `<div class="collection" style="font-size:16px;margin-bottom:4px;">ANNIE SELKE</div>`;

  const words = name.split(' ');
  const nameHtml = words.length > 2
    ? words.slice(0, Math.ceil(words.length / 2)).join(' ') + '<br>' + words.slice(Math.ceil(words.length / 2)).join(' ')
    : name;

  const tag = document.createElement('div');
  tag.className = 'tag';
  tag.innerHTML = `
    ${logoHtml}
    <div class="collection" contenteditable="true">${nameHtml}</div>
    <hr class="divider">
    <div class="variants ${gridClass}">${variantsHtml}</div>
  `;
  container.appendChild(tag);
}

function toggleCutLines() {
  const on = document.body.classList.toggle('no-cut-lines');
  document.getElementById('cutLineBtn').textContent = on ? 'Cut Lines: OFF' : 'Cut Lines: ON';
}
